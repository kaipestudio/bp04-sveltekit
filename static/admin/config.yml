backend:
  name: github
  repo: kaipestudio/bp04-sveltekit
  branch: main

publish_mode: editorial_workflow

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: servicos
    label: Serviços
    folder: src/content/servicos
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Título, widget: string }
      - { name: description, label: Descrição, widget: text }
      - { name: icon, label: Ícone, widget: string, required: false }
      - { name: order, label: Ordem, widget: number, default: 0 }